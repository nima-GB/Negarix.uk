<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEGARIX.UK | Secure Infrastructure</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <style>
        :root {
            /* Hard-locked Dark/Neon Theme - No OS Overrides */
            --bg-color: #080a08;
            --matrix-color: #00ff00; /* Neon Green */
            --particle-color: rgba(200, 255, 200, 0.4); /* Ghostly depth */
            --content-bg: rgba(10, 15, 10, 0.85); /* Deep frosted glass */
            --text-color: #00ff00;
            --accent-glow: 0 0 12px rgba(0, 255, 0, 0.7);
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex; align-items: center; justify-content: center;
        }

        canvas { display: block; position: fixed; top: 0; left: 0; }
        #particleCanvas { z-index: 1; opacity: 0.8; }
        #matrixCanvas { z-index: 2; }

        .content-container {
            z-index: 3;
            background: var(--content-bg);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 0, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.15), inset 0 0 20px rgba(0, 255, 0, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            width: 90%; max-width: 480px;
            text-align: center;
        }

        h1 { margin-top: 0; font-size: 2.5rem; text-shadow: var(--accent-glow); letter-spacing: 2px; }
        h2 { font-size: 1.1rem; opacity: 0.8; margin-bottom: 25px; }
        h3 { font-size: 1.1rem; margin-bottom: 20px; letter-spacing: 1px; text-shadow: var(--accent-glow); }
        
        hr {
            border: 0; height: 1px; background: var(--matrix-color);
            opacity: 0.3; margin: 20px 0; box-shadow: var(--accent-glow);
        }

        form { display: flex; flex-direction: column; gap: 15px; }
        label { text-align: left; font-size: 0.9rem; font-weight: bold; opacity: 0.9; }
        
        input, textarea {
            background: rgba(0, 20, 0, 0.4);
            border: 1px solid var(--matrix-color);
            color: var(--text-color);
            padding: 12px;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
            margin-top: 5px;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus { 
            outline: none; 
            box-shadow: inset var(--accent-glow); 
            background: rgba(0, 40, 0, 0.6);
        }
        
        textarea { resize: vertical; height: 80px; }
        
        .g-recaptcha {
            margin: 5px auto;
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 0 5px rgba(0,255,0,0.2));
        }

        button {
            background: transparent;
            color: var(--matrix-color);
            border: 1px solid var(--matrix-color);
            padding: 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            box-shadow: inset 0 0 10px rgba(0,255,0,0.1);
            transition: all 0.2s ease;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        button:hover { 
            background: var(--matrix-color);
            color: var(--bg-color);
            box-shadow: var(--accent-glow);
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    <canvas id="matrixCanvas"></canvas>

    <div class="content-container">
        <h1>NEGARIX.UK</h1>
        <h2>SECURE INFRASTRUCTURE<br>& ARCHITECTURE</h2>
        
        <hr>
        <h3>INITIATE SECURE TRANSMISSION</h3>

        <form action="https://formspree.io/f/xdavzgko" method="POST">
            <label>OPERATOR NAME:
                <input type="text" name="name" required placeholder="Identity required">
            </label>
            
            <label>CONTACT (EMAIL):
                <input type="email" name="email" required placeholder="name@domain.com">
            </label>
            
            <label>PAYLOAD (MESSAGE):
                <textarea name="message" required placeholder="Transmit encrypted text..."></textarea>
            </label>

            <div class="g-recaptcha" data-sitekey="6LfesBotAAAAAG_Guq1ZKS5977I7_omstqT_YDE8" data-theme="dark"></div>

            <button type="submit">TRANSMIT SECURELY</button>
        </form>
    </div>

    <script>
        /* ----------------------------------------------------
           ENGINE 1: Quantum Particles (Sub-stratum)
           ---------------------------------------------------- */
        const pCanvas = document.getElementById('particleCanvas');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        function setPCanvasSize() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }
        setPCanvasSize();

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('resize', setPCanvasSize);

        class Particle {
            constructor() {
                this.x = Math.random() * pCanvas.width;
                this.y = Math.random() * pCanvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.baseX = this.x; this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
            }
            draw() {
                pCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--particle-color');
                pCtx.beginPath(); pCtx.arc(this.x, this.y, this.size, 0, Math.random() * Math.PI * 2); pCtx.fill();
            }
            update() {
                const time = Date.now() * 0.001;
                const driftX = Math.sin(time + this.density) * 0.2;
                const driftY = Math.cos(time + this.density) * 0.2;
                this.x += this.vx + driftX; this.y += this.vy + driftY;

                if (mouse.x && mouse.y) {
                    let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx*dx + dy*dy);
                    if (distance < mouse.radius) {
                        this.x -= dx / 15; this.y -= dy / 15;
                    }
                }
                
                if (this.x < 0) this.x = pCanvas.width;
                if (this.x > pCanvas.width) this.x = 0;
                if (this.y < 0) this.y = pCanvas.height;
                if (this.y > pCanvas.height) this.y = 0;

                this.draw();
            }
        }
        function initParticles() {
            particles = [];
            const count = (pCanvas.width * pCanvas.height) / 12000;
            for (let i=0; i<count; i++) { particles.push(new Particle()); }
        }
        
        function drawQuantumConnections() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = dx * dx + dy * dy;
                    
                    if (distance < 12000) {
                        pCtx.strokeStyle = `rgba(200, 255, 200, ${0.8 - distance/12000})`;
                        pCtx.lineWidth = 0.5;
                        pCtx.beginPath();
                        pCtx.moveTo(particles[a].x, particles[a].y);
                        pCtx.lineTo(particles[b].x, particles[b].y);
                        pCtx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            pCtx.clearRect(0,0, pCanvas.width, pCanvas.height);
            particles.forEach(p => p.update());
            drawQuantumConnections();
            
            // Quantum Cursor Energy Field
            if (mouse.x && mouse.y) {
                let gradient = pCtx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 150);
                gradient.addColorStop(0, 'rgba(0, 255, 0, 0.15)');
                gradient.addColorStop(1, 'rgba(0, 255, 0, 0)');
                pCtx.fillStyle = gradient;
                pCtx.beginPath();
                pCtx.arc(mouse.x, mouse.y, 150, 0, Math.PI * 2);
                pCtx.fill();
            }
            
            requestAnimationFrame(animateParticles);
        }
        initParticles(); animateParticles();

        /* ----------------------------------------------------
           ENGINE 2: Breathing Matrix (Super-stratum)
           ---------------------------------------------------- */
        const mCanvas = document.getElementById('matrixCanvas');
        const mCtx = mCanvas.getContext('2d');
        const chars = 'アァカサタナハマヤラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨロヲゴゾドボポヴッン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ§†‡∞';
        const charArray = chars.split('');
        const fontSize = 16;
        let columns = [];

        function setMCanvasSize() {
            mCanvas.width = window.innerWidth;
            mCanvas.height = window.innerHeight;
            columns = [];
            for (let i=0; i<mCanvas.width/fontSize; i++) {
                columns[i] = Math.random() * mCanvas.height;
            }
        }
        setMCanvasSize();

        function drawMatrix() {
            const time = Date.now() * 0.001;
            const pulse = Math.abs(Math.sin(time * 0.5));
            mCtx.shadowBlur = 4 + (pulse * 8);
            const mColor = getComputedStyle(document.documentElement).getPropertyValue('--matrix-color');
            mCtx.shadowColor = mColor;
            mCtx.fillStyle = mColor;
            mCtx.font = fontSize + 'px monospace';

            mCtx.fillStyle = 'rgba(8, 10, 8, 0.08)'; // Darker fade for sharper contrast
            mCtx.fillRect(0,0, mCanvas.width, mCanvas.height);

            mCtx.fillStyle = mColor;
            columns.forEach((y, x) => {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                
                const weaveFactor = 6;
                const weaveOffset = Math.sin((y * 0.01) + time * 0.5) * weaveFactor;
                const weaveX = (x * fontSize) + weaveOffset;

                mCtx.fillText(text, weaveX, y);

                let speed = 1.8;
                
                if (mouse.x && mouse.y) {
                    const dx = mouse.x - weaveX;
                    const dy = mouse.y - y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 150) {
                        speed *= 2.5;
                        mCtx.fillStyle = '#ffffff'; // Flash white near cursor
                        mCtx.fillText(text, weaveX, y);
                        mCtx.fillStyle = mColor;
                    }
                }

                if (y > mCanvas.height && Math.random() > 0.975) {
                    columns[x] = 0;
                } else {
                    columns[x] = y + speed;
                }
            });
            requestAnimationFrame(drawMatrix);
        }
        drawMatrix();
    </script>
</body>
</html>
