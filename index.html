<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEGARIX.UK | Secure Infrastructure</title>

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/;
        frame-src https://www.google.com/recaptcha/;
        style-src 'self' 'unsafe-inline';
        connect-src 'self' https://formspree.io;
        img-src 'self' data:;
        base-uri 'self';
        form-action https://formspree.io;
    ">

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        :root {
            --bg-color: #080a08;
            --matrix-color: #00ff00;
            --particle-color: rgba(200, 255, 200, 0.4);
            --content-bg: rgba(10, 15, 10, 0.85);
            --text-color: #00ff00;
            --accent-glow: 0 0 12px rgba(0, 255, 0, 0.7);
        }

        body, html {
            margin: 0; padding: 0;
            min-height: 100%; width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex; align-items: center; justify-content: center;
        }

        body { overflow-x: hidden; }

        canvas { display: block; position: fixed; top: 0; left: 0; }
        #particleCanvas { z-index: 1; opacity: 0.8; }
        #matrixCanvas { z-index: 2; }

        .content-container {
            z-index: 3;
            background: var(--content-bg);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 0, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.15), inset 0 0 20px rgba(0, 255, 0, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            width: 90%; max-width: 480px;
            margin: 20px;
            text-align: center;
        }

        h1 { margin-top: 0; font-size: 2.5rem; text-shadow: var(--accent-glow); letter-spacing: 2px; }
        h2 { font-size: 1.1rem; opacity: 0.8; margin-bottom: 25px; }
        h3 { font-size: 1.1rem; margin-bottom: 20px; letter-spacing: 1px; text-shadow: var(--accent-glow); }

        hr {
            border: 0; height: 1px; background: var(--matrix-color);
            opacity: 0.3; margin: 20px 0; box-shadow: var(--accent-glow);
        }

        form { display: flex; flex-direction: column; gap: 15px; }
        label { text-align: left; font-size: 0.9rem; font-weight: bold; opacity: 0.9; }

        input, textarea {
            background: rgba(0, 20, 0, 0.4);
            border: 1px solid var(--matrix-color);
            color: var(--text-color);
            padding: 12px;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
            margin-top: 5px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            box-shadow: inset var(--accent-glow);
            background: rgba(0, 40, 0, 0.6);
        }

        textarea { resize: vertical; height: 80px; }

        /* Honeypot - hidden from humans, visible to bots that ignore CSS */
        .hp-field {
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .g-recaptcha {
            margin: 5px auto;
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 0 5px rgba(0,255,0,0.2));
        }

        button {
            background: transparent;
            color: var(--matrix-color);
            border: 1px solid var(--matrix-color);
            padding: 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            box-shadow: inset 0 0 10px rgba(0,255,0,0.1);
            transition: all 0.2s ease;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        button:hover, button:focus-visible {
            background: var(--matrix-color);
            color: var(--bg-color);
            box-shadow: var(--accent-glow);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-msg {
            font-size: 0.85rem;
            min-height: 1.2em;
            margin: 0;
        }
        .form-msg.error { color: #ff5050; }
        .form-msg.success { color: var(--matrix-color); }

        /* Respect reduced motion preference */
        @media (prefers-reduced-motion: reduce) {
            #particleCanvas, #matrixCanvas { display: none; }
            body { background: var(--bg-color); }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas" aria-hidden="true"></canvas>
    <canvas id="matrixCanvas" aria-hidden="true"></canvas>

    <main class="content-container">
        <h1>NEGARIX.UK</h1>
        <h2>SECURE INFRASTRUCTURE<br>&amp; ARCHITECTURE</h2>

        <hr>
        <h3>INITIATE SECURE TRANSMISSION</h3>

        <form id="contactForm" action="https://formspree.io/f/xdavzgko" method="POST" novalidate>

            <!-- Honeypot field: real users never see/fill this -->
            <label class="hp-field" aria-hidden="true">
                Leave this field empty
                <input type="text" name="_gotcha" tabindex="-1" autocomplete="off">
            </label>

            <label for="name">OPERATOR NAME:
                <input type="text" id="name" name="name" required minlength="2" maxlength="100"
                       autocomplete="name" placeholder="Identity required">
            </label>

            <label for="email">CONTACT (EMAIL):
                <input type="email" id="email" name="email" required maxlength="200"
                       autocomplete="email" placeholder="name@domain.com">
            </label>

            <label for="message">PAYLOAD (MESSAGE):
                <textarea id="message" name="message" required minlength="10" maxlength="5000"
                          placeholder="Transmit encrypted text..."></textarea>
            </label>

            <div class="g-recaptcha" data-sitekey="6LfesBotAAAAAG_Guq1ZKS5977I7_omstqT_YDE8" data-theme="dark"></div>

            <p id="formMsg" class="form-msg" role="alert" aria-live="polite"></p>

            <button type="submit" id="submitBtn">TRANSMIT SECURELY</button>
        </form>
    </main>

    <script>
        'use strict';

        /* ----------------------------------------------------
           FORM VALIDATION & SUBMISSION HANDLING
           ---------------------------------------------------- */
        (function () {
            const form = document.getElementById('contactForm');
            const submitBtn = document.getElementById('submitBtn');
            const msgEl = document.getElementById('formMsg');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            function setMsg(text, type) {
                msgEl.textContent = text;
                msgEl.className = 'form-msg' + (type ? ' ' + type : '');
            }

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                setMsg('', '');

                const name = form.name.value.trim();
                const email = form.email.value.trim();
                const message = form.message.value.trim();
                const honeypot = form._gotcha.value;

                // Silently drop likely-bot submissions
                if (honeypot) {
                    setMsg('Submission rejected.', 'error');
                    return;
                }

                if (name.length < 2) {
                    setMsg('Please enter your name.', 'error');
                    form.name.focus();
                    return;
                }

                if (!emailRegex.test(email)) {
                    setMsg('Please enter a valid email address.', 'error');
                    form.email.focus();
                    return;
                }

                if (message.length < 10) {
                    setMsg('Message must be at least 10 characters.', 'error');
                    form.message.focus();
                    return;
                }

                // reCAPTCHA check (if widget is present and loaded)
                if (typeof grecaptcha !== 'undefined') {
                    const token = grecaptcha.getResponse();
                    if (!token) {
                        setMsg('Please complete the reCAPTCHA.', 'error');
                        return;
                    }
                }

                submitBtn.disabled = true;
                setMsg('Transmitting...', '');

                try {
                    const formData = new FormData(form);
                    const response = await fetch(form.action, {
                        method: 'POST',
                        body: formData,
                        headers: { 'Accept': 'application/json' }
                    });

                    if (response.ok) {
                        setMsg('Transmission received. Standby for response.', 'success');
                        form.reset();
                        if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
                    } else {
                        setMsg('Transmission failed. Please try again later.', 'error');
                    }
                } catch (err) {
                    setMsg('Network error. Please try again later.', 'error');
                } finally {
                    submitBtn.disabled = false;
                }
            });
        })();

        /* ----------------------------------------------------
           ENGINE 1: Quantum Particles (Sub-stratum)
           ---------------------------------------------------- */
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        const pCanvas = document.getElementById('particleCanvas');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        // Cache CSS variable colors once
        const rootStyles = getComputedStyle(document.documentElement);
        const particleColor = rootStyles.getPropertyValue('--particle-color').trim();
        const matrixColor = rootStyles.getPropertyValue('--matrix-color').trim();

        function setPCanvasSize() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }
        setPCanvasSize();

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                setPCanvasSize();
                setMCanvasSize();
                initParticles();
            }, 200);
        });

        class Particle {
            constructor() {
                this.x = Math.random() * pCanvas.width;
                this.y = Math.random() * pCanvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.density = (Math.random() * 30) + 1;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
            }
            draw() {
                pCtx.fillStyle = particleColor;
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                pCtx.fill();
            }
            update(time) {
                const driftX = Math.sin(time + this.density) * 0.2;
                const driftY = Math.cos(time + this.density) * 0.2;
                this.x += this.vx + driftX;
                this.y += this.vy + driftY;

                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        this.x -= dx / 15;
                        this.y -= dy / 15;
                    }
                }

                if (this.x < 0) this.x = pCanvas.width;
                if (this.x > pCanvas.width) this.x = 0;
                if (this.y < 0) this.y = pCanvas.height;
                if (this.y > pCanvas.height) this.y = 0;

                this.draw();
            }
        }

        function initParticles() {
            particles = [];
            const isSmall = window.innerWidth < 768;
            const divisor = isSmall ? 25000 : 12000;
            const maxCount = isSmall ? 60 : 150;
            const count = Math.min(Math.floor((pCanvas.width * pCanvas.height) / divisor), maxCount);
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        // Spatial grid for connection lookups instead of O(n^2)
        const CONNECT_DIST = Math.sqrt(12000); // ~109.5px
        const CELL_SIZE = CONNECT_DIST;

        function drawQuantumConnections() {
            const grid = new Map();

            // Bucket particles into grid cells
            for (const p of particles) {
                const cx = Math.floor(p.x / CELL_SIZE);
                const cy = Math.floor(p.y / CELL_SIZE);
                const key = cx + ',' + cy;
                if (!grid.has(key)) grid.set(key, []);
                grid.get(key).push(p);
            }

            for (const p of particles) {
                const cx = Math.floor(p.x / CELL_SIZE);
                const cy = Math.floor(p.y / CELL_SIZE);

                // Only check this cell and neighbors
                for (let ox = -1; ox <= 1; ox++) {
                    for (let oy = -1; oy <= 1; oy++) {
                        const neighborKey = (cx + ox) + ',' + (cy + oy);
                        const neighbors = grid.get(neighborKey);
                        if (!neighbors) continue;

                        for (const other of neighbors) {
                            if (other === p) continue;
                            const dx = p.x - other.x;
                            const dy = p.y - other.y;
                            const distance = dx * dx + dy * dy;

                            if (distance < 12000) {
                                pCtx.strokeStyle = `rgba(200, 255, 200, ${0.8 - distance / 12000})`;
                                pCtx.lineWidth = 0.5;
                                pCtx.beginPath();
                                pCtx.moveTo(p.x, p.y);
                                pCtx.lineTo(other.x, other.y);
                                pCtx.stroke();
                            }
                        }
                    }
                }
            }
        }

        function animateParticles() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            const time = Date.now() * 0.001;
            particles.forEach(p => p.update(time));
            drawQuantumConnections();

            if (mouse.x !== null && mouse.y !== null) {
                const gradient = pCtx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 150);
                gradient.addColorStop(0, 'rgba(0, 255, 0, 0.15)');
                gradient.addColorStop(1, 'rgba(0, 255, 0, 0)');
                pCtx.fillStyle = gradient;
                pCtx.beginPath();
                pCtx.arc(mouse.x, mouse.y, 150, 0, Math.PI * 2);
                pCtx.fill();
            }

            requestAnimationFrame(animateParticles);
        }

        /* ----------------------------------------------------
           ENGINE 2: Breathing Matrix (Super-stratum)
           ---------------------------------------------------- */
        const mCanvas = document.getElementById('matrixCanvas');
        const mCtx = mCanvas.getContext('2d');
        const chars = 'アァカサタナハマヤラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨロヲゴゾドボポヴッン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ§†‡∞';
        const charArray = chars.split('');
        const fontSize = 16;
        let columns = [];

        function setMCanvasSize() {
            mCanvas.width = window.innerWidth;
            mCanvas.height = window.innerHeight;
            columns = [];
            for (let i = 0; i < mCanvas.width / fontSize; i++) {
                columns[i] = Math.random() * mCanvas.height;
            }
        }
        setMCanvasSize();

        function drawMatrix() {
            const time = Date.now() * 0.001;
            const pulse = Math.abs(Math.sin(time * 0.5));
            mCtx.shadowBlur = 4 + (pulse * 8);
            mCtx.shadowColor = matrixColor;

            mCtx.fillStyle = 'rgba(8, 10, 8, 0.08)';
            mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);

            mCtx.font = fontSize + 'px monospace';
            mCtx.fillStyle = matrixColor;

            columns.forEach((y, x) => {
                const text = charArray[Math.floor(Math.random() * charArray.length)];

                const weaveFactor = 6;
                const weaveOffset = Math.sin((y * 0.01) + time * 0.5) * weaveFactor;
                const weaveX = (x * fontSize) + weaveOffset;

                mCtx.fillText(text, weaveX, y);

                let speed = 1.8;

                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - weaveX;
                    const dy = mouse.y - y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        speed *= 2.5;
                        mCtx.fillStyle = '#ffffff';
                        mCtx.fillText(text, weaveX, y);
                        mCtx.fillStyle = matrixColor;
                    }
                }

                if (y > mCanvas.height && Math.random() > 0.975) {
                    columns[x] = 0;
                } else {
                    columns[x] = y + speed;
                }
            });
            requestAnimationFrame(drawMatrix);
        }

        // Only run animations if user hasn't requested reduced motion
        if (!reduceMotion) {
            initParticles();
            animateParticles();
            drawMatrix();
        }
    </script>
</body>
</html>
