<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEGARIX.UK | Secure Infrastructure</title>
    <style>
        :root {
            /* Default: Dark Mode (Night/OS Preference) */
            --bg-color: #0a0a0a;
            --matrix-color: #00ff00; /* Neon Green */
            --particle-color: rgba(0, 255, 0, 0.4);
            --content-bg: rgba(10, 10, 10, 0.85);
            --text-color: #00ff00;
            --accent-glow: 0 0 10px rgba(0, 255, 0, 0.7);
        }

        @media (prefers-color-scheme: light) {
            /* Fallback: Light Mode (Day) */
            :root {
                --bg-color: #f4f4f9;
                --matrix-color: #1a1a1a;
                --particle-color: rgba(26, 26, 26, 0.4);
                --content-bg: rgba(244, 244, 249, 0.85);
                --text-color: #1a1a1a;
                --accent-glow: 0 0 10px rgba(26, 26, 26, 0.3);
            }
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace; /* Technical font */
            display: flex; align-items: center; justify-content: center;
        }

        /* Architectural Layering */
        canvas { display: block; position: fixed; top: 0; left: 0; }
        #particleCanvas { z-index: 1; opacity: 0.7; } /* Deepest layer */
        #matrixCanvas { z-index: 2; } /* Mid-ground layer */

        /* Content Payload */
        .content-container {
            z-index: 3; /* Foreground */
            background: var(--content-bg);
            padding: 40px;
            border-radius: 10px;
            border: 1px solid var(--matrix-color);
            box-shadow: var(--accent-glow);
            backdrop-filter: blur(5px);
            width: 90%; max-width: 500px;
            text-align: center;
        }

        h1 { margin-top: 0; font-size: 2.5rem; text-shadow: var(--accent-glow); }
        h2 { font-size: 1.1rem; opacity: 0.8; margin-bottom: 30px; }

        /* Secure Form Styling */
        form { display: flex; flex-direction: column; gap: 15px; }
        label { text-align: left; font-size: 0.9rem; opacity: 0.9; }
        input, textarea {
            background: transparent;
            border: 1px solid var(--matrix-color);
            color: var(--text-color);
            padding: 10px;
            font-family: inherit;
            box-shadow: inset var(--accent-glow);
        }
        input:focus, textarea:focus { outline: none; border-color: var(--text-color); }
        textarea { resize: vertical; height: 100px; }
        button {
            background: var(--matrix-color);
            color: var(--bg-color);
            border: none;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: var(--accent-glow);
            transition: opacity 0.2s ease;
        }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    <canvas id="matrixCanvas"></canvas>

    <div class="content-container">
        <h1>NEGARIX.UK</h1>
        <h2>SECURE INFRASTRUCTURE & ARCHITECTURE</h2>
        <form action="https://formspree.io/f/xdavzgko" method="POST">
            <label>SENDER_ID (EMAIL):<br>
                <input type="email" name="email" required placeholder="required">
            </label>
            <label>PAYLOAD (MESSAGE):<br>
                <textarea name="message" required placeholder="Transmit encrypted..."></textarea>
            </label>
            <button type="submit">Transmit Securely</button>
        </form>
    </div>

    <script>
        /* ----------------------------------------------------
           ENGINE 1: Breathing Particles (Sub-stratum)
           ---------------------------------------------------- */
        const pCanvas = document.getElementById('particleCanvas');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 100 };

        function setPCanvasSize() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }
        setPCanvasSize();

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('resize', setPCanvasSize);

        class Particle {
            constructor() {
                this.x = Math.random() * pCanvas.width;
                this.y = Math.random() * pCanvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.baseX = this.x; this.baseY = this.y;
                this.density = (Math.random() * 20) + 5;
                // Forensic Breathing Drift
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
            }
            draw() {
                pCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--particle-color');
                pCtx.beginPath(); pCtx.arc(this.x, this.y, this.size, 0, Math.random() * Math.PI * 2); pCtx.fill();
            }
            update() {
                // Rhythmic Drift (Exhale/Inhale)
                const time = Date.now() * 0.001;
                const driftX = Math.sin(time + this.density) * 0.2;
                const driftY = Math.cos(time + this.density) * 0.2;
                this.x += this.vx + driftX; this.y += this.vy + driftY;

                // Mouse Interaction (Tier 1 Repel)
                if (mouse.x && mouse.y) {
                    let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx*dx + dy*dy);
                    if (distance < mouse.radius) {
                        this.x -= dx / 10; this.y -= dy / 10;
                    }
                }
                this.draw();
            }
        }
        function initParticles() {
            particles = [];
            const count = (pCanvas.width * pCanvas.height) / 15000;
            for (let i=0; i<count; i++) { particles.push(new Particle()); }
        }
        function animateParticles() {
            pCtx.clearRect(0,0, pCanvas.width, pCanvas.height);
            particles.forEach(p => p.update());
            requestAnimationFrame(animateParticles);
        }
        initParticles(); animateParticles();

        /* ----------------------------------------------------
           ENGINE 2: Breathing Matrix (Super-stratum)
           ---------------------------------------------------- */
        const mCanvas = document.getElementById('matrixCanvas');
        const mCtx = mCanvas.getContext('2d');
        const chars = 'アァカサタナハマヤラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨロヲゴゾドボポヴッン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ§†‡∞';
        const charArray = chars.split('');
        const fontSize = 16;
        let columns = [];

        function setMCanvasSize() {
            mCanvas.width = window.innerWidth;
            mCanvas.height = window.innerHeight;
            columns = [];
            for (let i=0; i<mCanvas.width/fontSize; i++) {
                columns[i] = Math.random() * mCanvas.height;
            }
        }
        setMCanvasSize();
        window.addEventListener('resize', setMCanvasSize);

        function drawMatrix() {
            // Apply Dynamic ShadowBlur for "Breathing" Pulse
            const time = Date.now() * 0.001;
            const pulse = Math.abs(Math.sin(time * 0.5)); // Breath freq
            mCtx.shadowBlur = 5 + (pulse * 10);
            const mColor = getComputedStyle(document.documentElement).getPropertyValue('--matrix-color');
            mCtx.shadowColor = mColor;
            mCtx.fillStyle = mColor;
            mCtx.font = fontSize + 'px monospace';

            // Use trailing rectangles for slow motion/fade
            mCtx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            mCtx.fillRect(0,0, mCanvas.width, mCanvas.height);

            mCtx.fillStyle = mColor;
            columns.forEach((y, x) => {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                
                // Advanced Math: Apply Horizontal "Weave" Drift Complexity
                const weaveFactor = 5; // Drift complexity from widget config
                const weaveOffset = Math.sin((y * 0.01) + time * 0.5) * weaveFactor;
                const weaveX = (x * fontSize) + weaveOffset;

                mCtx.fillText(text, weaveX, y);

                // Update Y position (Drop Speed from widget config)
                let speed = 1.5; // Base Drop Speed
                
                // Mouse Interaction (Tier 2 localized warp)
                if (mouse.x && mouse.y) {
                    const dx = mouse.x - weaveX;
                    const dy = mouse.y - y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 150) { // Interaction radius
                        speed *= 2; // Locally speed up
                    }
                }

                if (y > mCanvas.height && Math.random() > 0.975) {
                    columns[x] = 0;
                } else {
                    columns[x] = y + speed;
                }
            });
            requestAnimationFrame(drawMatrix);
        }
        drawMatrix();

    </script>
</body>
</html>
