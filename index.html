<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÉRIDIAN</title>

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/;
        frame-src https://www.google.com/recaptcha/;
        style-src 'self' 'unsafe-inline';
        connect-src 'self' https://formspree.io;
        img-src 'self' data:;
        base-uri 'self';
        form-action https://formspree.io;
    ">

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        /* ── TOKENS ─────────────────────────────────────────── */
        :root {
            --black:        #050705;
            --green:        #00ff41;
            --green-dim:    #00c032;
            --green-ghost:  rgba(0, 255, 65, 0.07);
            --green-glow:   rgba(0, 255, 65, 0.55);
            --red-alert:    #ff3c3c;
            --text:         #00ff41;
            --text-muted:   rgba(0, 255, 65, 0.5);
            --glass-bg:     rgba(5, 12, 5, 0.88);
            --border:       rgba(0, 255, 65, 0.25);
            --border-hot:   rgba(0, 255, 65, 0.7);
            --glow-sm:      0 0 8px rgba(0,255,65,0.6);
            --glow-md:      0 0 18px rgba(0,255,65,0.45);
            --glow-lg:      0 0 40px rgba(0,255,65,0.25);
            --font-mono:    'Courier New', Courier, monospace;
            --transition:   0.25s ease;
        }

        /* ── RESET ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; min-height: 100%;
            background: var(--black);
            color: var(--text);
            font-family: var(--font-mono);
            overflow-x: hidden;
        }

        /* ── BOOT SCREEN ────────────────────────────────────── */
        #boot {
            position: fixed; inset: 0;
            background: var(--black);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: clamp(24px, 8vw, 80px);
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #boot.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        #boot-lines {
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            line-height: 1.9;
            color: var(--green);
            max-width: 640px;
            width: 100%;
        }
        #boot-lines .line { display: block; opacity: 0; }
        #boot-lines .line.visible { opacity: 1; }
        #boot-lines .ok   { color: var(--green); }
        #boot-lines .warn { color: #ffcc00; }
        #boot-lines .err  { color: var(--red-alert); }
        #boot-lines .dim  { color: var(--text-muted); }

        #boot-cursor {
            display: inline-block;
            width: 9px; height: 1.1em;
            background: var(--green);
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: blink 0.75s step-end infinite;
        }

        /* ── SCANLINE OVERLAY ───────────────────────────────── */
        #scanlines {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0,0,0,0.13) 3px,
                rgba(0,0,0,0.13) 4px
            );
            mix-blend-mode: multiply;
        }

        /* ── VIGNETTE ───────────────────────────────────────── */
        #vignette {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 899;
            background: radial-gradient(ellipse at center,
                transparent 55%,
                rgba(0,0,0,0.65) 100%
            );
        }

        /* ── CANVASES ───────────────────────────────────────── */
        canvas {
            display: block;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #particleCanvas { z-index: 1; opacity: 0.7; }
        #matrixCanvas   { z-index: 2; opacity: 0.55; }

        /* ── MAIN LAYOUT ────────────────────────────────────── */
        #app {
            position: relative;
            z-index: 10;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            opacity: 1;
            transition: opacity 0.8s ease;
        }
        /* JS adds .booting immediately to hide during boot, then .visible to fade in */
        #app.booting { opacity: 0; }
        #app.visible { opacity: 1; }

        /* ── CARD ───────────────────────────────────────────── */
        .card {
            width: 100%;
            max-width: 520px;
            background: var(--glass-bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            box-shadow:
                0 0 0 1px rgba(0,255,65,0.04),
                var(--glow-lg),
                inset 0 0 60px rgba(0,255,65,0.03);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            overflow: hidden;
        }

        /* ── CARD HEADER ────────────────────────────────────── */
        .card-header {
            padding: 28px 32px 24px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        /* status bar strip */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
        }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: var(--glow-sm);
            animation: pulse-dot 2.5s ease-in-out infinite;
            flex-shrink: 0;
        }
        .status-bar span { flex: 1; }
        .status-time { font-variant-numeric: tabular-nums; }

        /* glitch title */
        .site-title {
            font-size: clamp(2rem, 7vw, 3rem);
            font-weight: 700;
            letter-spacing: 0.12em;
            line-height: 1;
            position: relative;
            display: inline-block;
            text-shadow: var(--glow-sm);
            user-select: none;
        }
        .site-title::before,
        .site-title::after {
            content: attr(data-text);
            position: absolute;
            inset: 0;
            opacity: 0;
        }
        .site-title::before {
            color: #00ffff;
            clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
            animation: glitch-top 4.5s infinite;
        }
        .site-title::after {
            color: #ff0040;
            clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
            animation: glitch-bot 4.5s infinite 0.1s;
        }

        .site-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* corner decoration */
        .corner { position: absolute; width: 14px; height: 14px; }
        .corner.tl { top: 10px; left: 10px; border-top: 1px solid var(--green-dim); border-left: 1px solid var(--green-dim); }
        .corner.tr { top: 10px; right: 10px; border-top: 1px solid var(--green-dim); border-right: 1px solid var(--green-dim); }
        .corner.bl { bottom: 10px; left: 10px; border-bottom: 1px solid var(--green-dim); border-left: 1px solid var(--green-dim); }
        .corner.br { bottom: 10px; right: 10px; border-bottom: 1px solid var(--green-dim); border-right: 1px solid var(--green-dim); }

        /* ── CARD BODY ──────────────────────────────────────── */
        .card-body { padding: 28px 32px 32px; }

        .section-label {
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--border), transparent);
        }

        /* ── FORM ───────────────────────────────────────────── */
        .form { display: flex; flex-direction: column; gap: 18px; }

        .field { display: flex; flex-direction: column; gap: 6px; }

        .field-label {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .field-wrap {
            position: relative;
            display: flex;
            align-items: stretch;
        }

        .field-prefix {
            display: flex;
            align-items: center;
            padding: 0 10px;
            background: rgba(0,255,65,0.04);
            border: 1px solid var(--border);
            border-right: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .field-input {
            flex: 1;
            background: rgba(0, 18, 4, 0.5);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 11px 14px;
            font-family: var(--font-mono);
            font-size: 0.88rem;
            outline: none;
            transition: var(--transition);
            caret-color: var(--green);
            width: 100%;
        }

        /* decryption scramble on focus */
        .field-input:focus {
            border-color: var(--border-hot);
            background: rgba(0, 28, 6, 0.7);
            box-shadow: inset 0 0 20px rgba(0,255,65,0.05), var(--glow-sm);
        }
        .field-input:focus ~ .field-scan { opacity: 1; }
        .field-wrap:focus-within .field-prefix {
            border-color: var(--border-hot);
            color: var(--green);
        }

        /* scan line that sweeps on focus */
        .field-scan {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            bottom: 0;
            background: linear-gradient(to right, transparent, var(--green), transparent);
            opacity: 0;
            transition: opacity 0.2s ease;
            animation: scan-sweep 1.8s ease-in-out infinite;
            pointer-events: none;
        }

        textarea.field-input {
            resize: vertical;
            min-height: 90px;
            line-height: 1.6;
        }

        /* ── CHAR COUNTER ───────────────────────────────────── */
        .char-counter {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-align: right;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }
        .char-counter.warn { color: #ffcc00; }
        .char-counter.danger { color: var(--red-alert); }

        /* ── HONEYPOT ───────────────────────────────────────── */
        .hp-field {
            position: absolute;
            left: -9999px; width: 1px; height: 1px;
            opacity: 0; pointer-events: none;
        }

        /* ── RECAPTCHA ──────────────────────────────────────── */
        .recaptcha-wrap {
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 0 6px rgba(0,255,65,0.15));
        }

        /* ── MSG ────────────────────────────────────────────── */
        .form-msg {
            font-size: 0.75rem;
            min-height: 1em;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 2px;
        }
        .form-msg::before { content: ''; display: none; }
        .form-msg.error  { color: var(--red-alert); }
        .form-msg.error::before  { display: inline-block; content: '✕'; }
        .form-msg.success { color: var(--green); }
        .form-msg.success::before { display: inline-block; content: '✓'; }
        .form-msg.info { color: var(--text-muted); }
        .form-msg.info::before { display: inline-block; content: '›'; }

        /* ── SUBMIT BUTTON ──────────────────────────────────── */
        .submit-btn {
            position: relative;
            background: transparent;
            color: var(--green);
            border: 1px solid var(--border-hot);
            padding: 15px 20px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            overflow: hidden;
            transition: color var(--transition), box-shadow var(--transition);
            width: 100%;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--green);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            z-index: 0;
        }

        .submit-btn:hover::before,
        .submit-btn:focus-visible::before { transform: scaleX(1); }
        .submit-btn:hover,
        .submit-btn:focus-visible {
            color: var(--black);
            box-shadow: var(--glow-md);
            outline: none;
        }

        .submit-btn span { position: relative; z-index: 1; }

        .submit-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* progress bar inside button */
        .btn-progress {
            position: absolute;
            bottom: 0; left: 0;
            height: 2px;
            width: 0%;
            background: var(--green);
            transition: width 2s linear;
            z-index: 2;
        }
        .submit-btn.loading .btn-progress { width: 85%; }

        /* ── FOOTER ─────────────────────────────────────────── */
        .card-footer {
            padding: 14px 32px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .card-footer span {
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .enc-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.6rem;
            color: var(--green);
            letter-spacing: 0.1em;
        }
        .enc-badge svg { width: 10px; height: 10px; }

        /* ── ANIMATIONS ─────────────────────────────────────── */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 4px 1px rgba(0,255,65,0.6); }
            50%       { box-shadow: 0 0 10px 3px rgba(0,255,65,0.9); }
        }

        @keyframes glitch-top {
            0%,89%,100% { opacity: 0; transform: translate(0); }
            90%          { opacity: 0.7; transform: translate(-3px, -1px); }
            92%          { opacity: 0.7; transform: translate(3px, 0); }
            94%          { opacity: 0; }
        }
        @keyframes glitch-bot {
            0%,89%,100% { opacity: 0; transform: translate(0); }
            90%          { opacity: 0.6; transform: translate(3px, 1px); }
            93%          { opacity: 0.6; transform: translate(-2px, 0); }
            95%          { opacity: 0; }
        }

        @keyframes scan-sweep {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── REDUCED MOTION ─────────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {
            #particleCanvas, #matrixCanvas, #scanlines { display: none; }
            .site-title::before, .site-title::after { display: none; }
            *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
            #boot { display: none; }
            #app { opacity: 1 !important; }
        }

        /* ── MOBILE ─────────────────────────────────────────── */
        @media (max-width: 480px) {
            .card-header, .card-body { padding-left: 20px; padding-right: 20px; }
            .card-footer { padding-left: 20px; padding-right: 20px; }
            .site-title { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

    <!-- CRT scanlines & vignette -->
    <div id="scanlines" aria-hidden="true"></div>
    <div id="vignette"  aria-hidden="true"></div>

    <!-- Canvases -->
    <canvas id="particleCanvas" aria-hidden="true"></canvas>
    <canvas id="matrixCanvas"   aria-hidden="true"></canvas>

    <!-- Boot sequence -->
    <div id="boot" role="status" aria-label="System initialising">
        <div id="boot-lines"></div>
    </div>

    <!-- Main content -->
    <div id="app">
      <main class="card" role="main">

        <header class="card-header">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <div class="status-bar">
                <div class="status-dot" aria-hidden="true"></div>
                <span>SECURE CHANNEL ACTIVE</span>
                <span class="status-time" id="liveClock" aria-live="off"></span>
            </div>

            <h1 class="site-title" data-text="NEGARIX.UK">NEGARIX.UK</h1>
            <p class="site-sub">MÉRIDIAN &amp;</p>
        </header>

        <div class="card-body">
            <p class="section-label">Initiate Secure Transmission</p>

            <form id="contactForm" class="form"
                  action="https://formspree.io/f/xdavzgko"
                  method="POST" novalidate>

                <!-- Honeypot -->
                <label class="hp-field" aria-hidden="true">
                    Leave empty
                    <input type="text" name="_gotcha" tabindex="-1" autocomplete="off">
                </label>

                <!-- Name -->
                <div class="field">
                    <label class="field-label" for="inp-name">Operator Identity</label>
                    <div class="field-wrap">
                        <span class="field-prefix" aria-hidden="true">ID://</span>
                        <input class="field-input" type="text" id="inp-name" name="name"
                               required minlength="2" maxlength="100"
                               autocomplete="name" spellcheck="false"
                               placeholder="Full name or handle">
                        <div class="field-scan" aria-hidden="true"></div>
                    </div>
                </div>

                <!-- Email -->
                <div class="field">
                    <label class="field-label" for="inp-email">Secure Endpoint</label>
                    <div class="field-wrap">
                        <span class="field-prefix" aria-hidden="true">@://</span>
                        <input class="field-input" type="email" id="inp-email" name="email"
                               required maxlength="200"
                               autocomplete="email" spellcheck="false"
                               placeholder="name@domain.com">
                        <div class="field-scan" aria-hidden="true"></div>
                    </div>
                </div>

                <!-- Message -->
                <div class="field">
                    <label class="field-label" for="inp-message">Payload</label>
                    <div class="field-wrap" style="flex-direction:column">
                        <textarea class="field-input" id="inp-message" name="message"
                                  required minlength="10" maxlength="5000"
                                  spellcheck="false"
                                  placeholder="Transmit your message..."></textarea>
                        <div class="field-scan" aria-hidden="true"></div>
                    </div>
                    <div class="char-counter" id="charCounter" aria-live="polite">0 / 5000</div>
                </div>

                <!-- reCAPTCHA -->
                <div class="recaptcha-wrap">
                    <div class="g-recaptcha"
                         data-sitekey="6LfesBotAAAAAG_Guq1ZKS5977I7_omstqT_YDE8"
                         data-theme="dark"></div>
                </div>

                <!-- Status message -->
                <p id="formMsg" class="form-msg" role="alert" aria-live="polite"></p>

                <!-- Submit -->
                <button type="submit" id="submitBtn" class="submit-btn">
                    <div class="btn-progress" id="btnProgress"></div>
                    <span id="btnLabel">Transmit Securely</span>
                </button>

            </form>
        </div>

        <footer class="card-footer">
            <span>NEGARIX.UK &copy; <span id="footerYear"></span></span>
            <div class="enc-badge">
                <svg viewBox="0 0 12 12" fill="none" aria-hidden="true">
                    <rect x="2" y="5" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
                    <path d="M4 5V3.5a2 2 0 0 1 4 0V5" stroke="currentColor" stroke-width="1.2"/>
                </svg>
                TLS 1.3 · AES-256
            </div>
        </footer>

      </main>
    </div>

    <script>
    'use strict';

    /* ═══════════════════════════════════════════════════════════
       BOOT SEQUENCE
    ═══════════════════════════════════════════════════════════ */
    (function () {
        const LINES = [
            { text: 'NEGARIX SECURE KERNEL v4.1.0 — INIT',         cls: '' },
            { text: 'Loading cryptographic modules...',              cls: 'dim', delay: 60 },
            { text: '  [✓] AES-256-GCM                  OK',        cls: 'ok' },
            { text: '  [✓] TLS 1.3 handshake            OK',        cls: 'ok' },
            { text: '  [✓] ECDHE key exchange            OK',        cls: 'ok' },
            { text: '  [✓] reCAPTCHA v2 integrity        OK',        cls: 'ok' },
            { text: 'Scanning threat surface...',                    cls: 'dim' },
            { text: '  [✓] CSP enforced                  OK',        cls: 'ok' },
            { text: '  [✓] CSRF honeypot active           OK',        cls: 'ok' },
            { text: '  [✓] Input sanitisation layer       OK',        cls: 'ok' },
            { text: '  [~] Quantum particle engine        ONLINE',   cls: 'warn' },
            { text: 'Establishing secure channel...',                cls: 'dim' },
            { text: '  [✓] Endpoint verified              READY',    cls: 'ok' },
            { text: '─────────────────────────────────────────',    cls: 'dim' },
            { text: 'ACCESS GRANTED. SECURE CHANNEL OPEN.',         cls: '' },
        ];

        const container = document.getElementById('boot-lines');
        const bootEl    = document.getElementById('boot');
        const appEl     = document.getElementById('app');

        // Hide app immediately so boot plays cleanly
        appEl.classList.add('booting');

        // Reduced motion: skip boot
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            bootEl.classList.add('hidden');
            appEl.classList.remove('booting');
            appEl.classList.add('visible');
            return;
        }

        let lineIdx = 0;
        let totalDelay = 0;

        LINES.forEach((item, i) => {
            const span = document.createElement('span');
            span.className = 'line' + (item.cls ? ' ' + item.cls : '');
            span.textContent = item.text;
            container.appendChild(span);

            const baseDelay = i === 0 ? 200 : totalDelay + (item.delay || 90) + (Math.random() * 60);
            totalDelay = baseDelay;

            setTimeout(() => {
                span.classList.add('visible');
            }, baseDelay);
        });

        // Add blinking cursor at end
        const cursorSpan = document.createElement('span');
        cursorSpan.className = 'line visible';
        cursorSpan.innerHTML = '&gt; <span id="boot-cursor"></span>';
        container.appendChild(cursorSpan);

        // Hide boot, show app
        setTimeout(() => {
            bootEl.classList.add('hidden');
            appEl.classList.remove('booting');
            appEl.classList.add('visible');
        }, totalDelay + 700);
    })();

    /* ═══════════════════════════════════════════════════════════
       LIVE CLOCK
    ═══════════════════════════════════════════════════════════ */
    (function () {
        const el = document.getElementById('liveClock');
        const yr = document.getElementById('footerYear');
        function tick() {
            const now = new Date();
            el.textContent = now.toISOString().replace('T',' ').substring(0,19) + ' UTC';
            yr.textContent = now.getFullYear();
        }
        tick();
        setInterval(tick, 1000);
    })();

    /* ═══════════════════════════════════════════════════════════
       CHAR COUNTER
    ═══════════════════════════════════════════════════════════ */
    (function () {
        const ta      = document.getElementById('inp-message');
        const counter = document.getElementById('charCounter');
        const MAX     = 5000;
        ta.addEventListener('input', () => {
            const len = ta.value.length;
            counter.textContent = len + ' / ' + MAX;
            counter.className = 'char-counter' +
                (len > MAX * 0.9 ? ' danger' : len > MAX * 0.75 ? ' warn' : '');
        });
    })();

    /* ═══════════════════════════════════════════════════════════
       FORM VALIDATION & SUBMISSION
    ═══════════════════════════════════════════════════════════ */
    (function () {
        const form      = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnLabel  = document.getElementById('btnLabel');
        const btnProg   = document.getElementById('btnProgress');
        const msgEl     = document.getElementById('formMsg');
        const emailRx   = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        function msg(text, type) {
            msgEl.textContent = text;
            msgEl.className   = 'form-msg' + (type ? ' ' + type : '');
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            msg('', '');

            const name     = form['name'].value.trim();
            const email    = form['email'].value.trim();
            const message  = form['message'].value.trim();
            const honeypot = form['_gotcha'].value;

            if (honeypot) { msg('Transmission rejected.', 'error'); return; }
            if (name.length < 2)       { msg('Operator identity required (min 2 chars).', 'error'); form['name'].focus(); return; }
            if (!emailRx.test(email))  { msg('Valid secure endpoint required.', 'error'); form['email'].focus(); return; }
            if (message.length < 10)   { msg('Payload too short (min 10 chars).', 'error'); form['message'].focus(); return; }
            if (message.length > 5000) { msg('Payload exceeds 5000 char limit.', 'error'); form['message'].focus(); return; }

            if (typeof grecaptcha !== 'undefined' && !grecaptcha.getResponse()) {
                msg('Complete the reCAPTCHA to proceed.', 'error');
                return;
            }

            // Send
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            btnLabel.textContent = 'Transmitting...';
            msg('Encrypting payload...', 'info');

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (res.ok) {
                    btnLabel.textContent = 'Transmitted ✓';
                    btnProg.style.width  = '100%';
                    msg('Transmission received. Standby for response.', 'success');
                    form.reset();
                    document.getElementById('charCounter').textContent = '0 / 5000';
                    if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
                    setTimeout(() => { btnLabel.textContent = 'Transmit Securely'; btnProg.style.width = '0%'; }, 3000);
                } else {
                    msg('Transmission failed (' + res.status + '). Retry later.', 'error');
                    btnLabel.textContent = 'Transmit Securely';
                }
            } catch {
                msg('Network error. Check connection and retry.', 'error');
                btnLabel.textContent = 'Transmit Securely';
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
            }
        });
    })();

    /* ═══════════════════════════════════════════════════════════
       ANIMATION ENGINES
    ═══════════════════════════════════════════════════════════ */
    (function () {
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (reduceMotion) return;

        const rootStyles    = getComputedStyle(document.documentElement);
        const PARTICLE_COL  = 'rgba(0, 255, 65, 0.45)';
        const MATRIX_COL    = rootStyles.getPropertyValue('--green').trim() || '#00ff41';

        // ── shared mouse state ──────────────────────────────────
        const mouse = { x: null, y: null };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseout',  () => { mouse.x = null;     mouse.y = null; });

        // ── debounced resize ────────────────────────────────────
        let resizeTimer;
        function onResize(cbs) {
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => cbs.forEach(f => f()), 200);
            });
        }

        /* ── ENGINE 1: Particle field ──────────────────────────── */
        const pCanvas = document.getElementById('particleCanvas');
        const pCtx    = pCanvas.getContext('2d');
        let particles = [];

        function sizePCanvas() {
            pCanvas.width  = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }
        sizePCanvas();

        const CONN_DIST_SQ = 11000;
        const CELL_SIZE    = Math.sqrt(CONN_DIST_SQ) + 1;

        class Particle {
            constructor() { this.reset(true); }
            reset(init) {
                this.x = Math.random() * pCanvas.width;
                this.y = init ? Math.random() * pCanvas.height : -5;
                this.r = Math.random() * 1.8 + 0.4;
                this.vx = (Math.random() - 0.5) * 0.35;
                this.vy = (Math.random() - 0.5) * 0.35;
                this.phase = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.3 + 0.1;
            }
            update(t) {
                this.x += this.vx + Math.sin(t * this.speed + this.phase) * 0.18;
                this.y += this.vy + Math.cos(t * this.speed + this.phase) * 0.18;

                if (mouse.x !== null) {
                    const dx = mouse.x - this.x, dy = mouse.y - this.y;
                    const d2 = dx*dx + dy*dy;
                    if (d2 < 18000) {
                        const f = (1 - d2/18000) * 0.4;
                        this.x -= dx * f * 0.06;
                        this.y -= dy * f * 0.06;
                    }
                }

                if (this.x < -5)              this.x = pCanvas.width + 5;
                if (this.x > pCanvas.width+5)  this.x = -5;
                if (this.y < -5)               this.y = pCanvas.height + 5;
                if (this.y > pCanvas.height+5) this.y = -5;
            }
        }

        function buildParticles() {
            const small  = window.innerWidth < 768;
            const max    = small ? 55 : 140;
            const count  = Math.min(Math.floor(pCanvas.width * pCanvas.height / (small ? 22000 : 11000)), max);
            particles = Array.from({ length: count }, () => new Particle());
        }

        // Batch all connections into ONE path per frame
        function drawConnections() {
            const grid = new Map();
            for (const p of particles) {
                const key = Math.floor(p.x / CELL_SIZE) + ',' + Math.floor(p.y / CELL_SIZE);
                if (!grid.has(key)) grid.set(key, []);
                grid.get(key).push(p);
            }

            // collect unique pairs first, draw in one pass per alpha bucket
            const buckets = new Map();
            for (const p of particles) {
                const cx = Math.floor(p.x / CELL_SIZE);
                const cy = Math.floor(p.y / CELL_SIZE);
                for (let ox = -1; ox <= 1; ox++) {
                    for (let oy = -1; oy <= 1; oy++) {
                        const nb = grid.get((cx+ox) + ',' + (cy+oy));
                        if (!nb) continue;
                        for (const q of nb) {
                            if (q === p) continue;
                            const dx = p.x - q.x, dy = p.y - q.y;
                            const d2 = dx*dx + dy*dy;
                            if (d2 < CONN_DIST_SQ) {
                                const alpha = Math.round((0.75 - d2/CONN_DIST_SQ) * 10) / 10;
                                if (!buckets.has(alpha)) buckets.set(alpha, []);
                                buckets.get(alpha).push(p.x, p.y, q.x, q.y);
                            }
                        }
                    }
                }
            }

            buckets.forEach((coords, alpha) => {
                pCtx.beginPath();
                pCtx.strokeStyle = `rgba(0,255,65,${alpha})`;
                pCtx.lineWidth   = 0.4;
                for (let i = 0; i < coords.length; i += 4) {
                    pCtx.moveTo(coords[i],   coords[i+1]);
                    pCtx.lineTo(coords[i+2], coords[i+3]);
                }
                pCtx.stroke();
            });
        }

        function tickParticles(t) {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

            // draw all particle dots in one fill path
            pCtx.beginPath();
            pCtx.fillStyle = PARTICLE_COL;
            for (const p of particles) {
                p.update(t);
                pCtx.moveTo(p.x + p.r, p.y);
                pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            }
            pCtx.fill();

            drawConnections();

            if (mouse.x !== null) {
                const g = pCtx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 130);
                g.addColorStop(0, 'rgba(0,255,65,0.13)');
                g.addColorStop(1, 'rgba(0,255,65,0)');
                pCtx.fillStyle = g;
                pCtx.beginPath();
                pCtx.arc(mouse.x, mouse.y, 130, 0, Math.PI * 2);
                pCtx.fill();
            }
        }

        /* ── ENGINE 2: Matrix rain ─────────────────────────────── */
        const mCanvas = document.getElementById('matrixCanvas');
        const mCtx    = mCanvas.getContext('2d');
        const CHARS   = 'アァカサタナハマヤラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨロヲゴゾドボポヴッン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ§†‡∞Ξ≡Ω'.split('');
        const FS      = 15;
        let cols      = [];

        function sizeMCanvas() {
            mCanvas.width  = window.innerWidth;
            mCanvas.height = window.innerHeight;
            cols = Array.from({ length: Math.floor(mCanvas.width / FS) },
                              () => Math.random() * mCanvas.height);
        }
        sizeMCanvas();

        function tickMatrix(t) {
            const pulse = Math.abs(Math.sin(t * 0.4));
            mCtx.shadowBlur  = 3 + pulse * 6;
            mCtx.shadowColor = MATRIX_COL;
            mCtx.fillStyle   = 'rgba(5,7,5,0.09)';
            mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
            mCtx.font      = FS + 'px monospace';
            mCtx.fillStyle = MATRIX_COL;

            for (let i = 0; i < cols.length; i++) {
                const y = cols[i];
                const ch = CHARS[(Math.random() * CHARS.length) | 0];
                const wx = i * FS + Math.sin(y * 0.012 + t * 0.45) * 5;

                let speed = 1.6;
                if (mouse.x !== null) {
                    const dx = mouse.x - wx, dy = mouse.y - y;
                    if (dx*dx + dy*dy < 20000) {
                        speed *= 2.8;
                        mCtx.fillStyle = '#ffffff';
                        mCtx.fillText(ch, wx, y);
                        mCtx.fillStyle = MATRIX_COL;
                    }
                }
                mCtx.fillText(ch, wx, y);

                cols[i] = (y > mCanvas.height && Math.random() > 0.975) ? 0 : y + speed;
            }
        }

        /* ── UNIFIED RAF LOOP ──────────────────────────────────── */
        function loop(ts) {
            const t = ts * 0.001;
            tickParticles(t);
            tickMatrix(t);
            requestAnimationFrame(loop);
        }

        buildParticles();
        onResize([sizePCanvas, sizeMCanvas, buildParticles]);
        requestAnimationFrame(loop);

    })();
    </script>
</body>
</html>
